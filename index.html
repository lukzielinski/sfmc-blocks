<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 15px;
}

#sidebar {
    width: 100%;
}

h3 {
    margin-top: 0;
}

.item {
    cursor: pointer;
    padding: 10px 0;
    border-bottom: 1px solid #ddd;
    display: flex;
    align-items: center;
}

.item:hover {
    background: #f5f5f5;
}

.thumb {
    width: 100px;
    margin-right: 15px;
    border: 1px solid #ccc;
}

#preview {
    margin-top: 25px;
    text-align: center;
}

#active-label {
    max-width: 100%;
    display: none;
}
</style>

</head>

<body>

<div id="sidebar">

<h3>Wybierz etykietę:</h3>

<div class="item"
     onclick="selectLabel('https://imgnews.raja-group.com/00-structure/label/FR-label-month-selection.png','Sélection du mois')">

<img class="thumb"
src="https://imgnews.raja-group.com/00-structure/label/FR-label-month-selection.png">

<span>Sélection du mois</span>

</div>

<div class="item"
     onclick="selectLabel('https://imgnews.raja-group.com/00-structure/label/FR-label-special-offer.png','Offre spéciale')">

<img class="thumb"
src="https://imgnews.raja-group.com/00-structure/label/FR-label-special-offer.png">

<span>Offre spéciale</span>

</div>

</div>

<div id="preview">

<img id="active-label">

</div>

<script src="https://blocksdk.sfdc.io/blocksdk.js"></script>

<script>

const sdk = new window.sfdc.BlockSDK();

sdk.ready(function () {

    sdk.getData().then(function(data){

        if(data && data.selectedUrl){

            const img = document.getElementById("active-label");

            img.src = data.selectedUrl;
            img.style.display = "block";
        }

    });

});

function selectLabel(url, altText){

    const img = document.getElementById("active-label");

    img.src = url;
    img.style.display = "block";

    const html =
        '<img src="' + url + '"' +
        ' width="268"' +
        ' height="26"' +
        ' style="display:block;border:0;"' +
        ' alt="' + altText + '">';

    sdk.setContent(html);

    sdk.setData({
        selectedUrl: url,
        selectedAlt: altText
    });

}

</script>

</body>
</html>
