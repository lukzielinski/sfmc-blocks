<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 300px; overflow-y: auto; padding: 10px; border-right: 1px solid #ccc; background: #f9f9f9; }
        #preview { flex-grow: 1; padding: 20px; display: flex; align-items: center; justify-content: center; }
        .item { cursor: pointer; padding: 8px; border-bottom: 1px solid #ddd; display: flex; align-items: center; }
        .item:hover { background: #eef; }
        img.thumb { width: 100px; margin-right: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Wybierz etykietę:</h3>
    <div class="item" onclick="selectLabel('https://imgnews.raja-group.com/00-structure/label/FR-label-month-selection.png', 'Sélection du mois')">
        <img class="thumb" src="https://imgnews.raja-group.com/00-structure/label/FR-label-month-selection.png">
        <span>Sélection du mois</span>
    </div>
    <div class="item" onclick="selectLabel('https://imgnews.raja-group.com/00-structure/label/FR-label-special-offer.png', 'Offre spéciale')">
        <img class="thumb" src="https://imgnews.raja-group.com/00-structure/label/FR-label-special-offer.png">
        <span>Offre spéciale</span>
    </div>
    </div>

<div id="preview">
    <img id="active-label" src="" style="display:none; max-width: 100%;">
</div>

<script src="https://blocksdk.sfdc.io/blocksdk.js"></script>
<script>
    var sdk = new window.sfdc.BlockSDK();

    function selectLabel(url, altText) {
        // 1. Pokaż w podglądzie bloku
        const img = document.getElementById('active-label');
        img.src = url;
        img.style.display = 'block';

        // 2. Wstrzyknij kod do edytora e-maila
        const htmlCode = `<img src="${url}" width="268" height="26" style="display:block; border:0;" alt="${altText}">`;
        sdk.setContent(htmlCode);
        
        // 3. Zapisz wybór, żeby blok go pamiętał przy ponownym otwarciu
        sdk.setData({ selectedUrl: url, selectedAlt: altText });
    }

    // Wczytaj zapisany stan przy otwarciu
    sdk.getData(function(data) {
        if (data.selectedUrl) {
            selectLabel(data.selectedUrl, data.selectedAlt);
        }
    });
</script>
</body>
</html>
