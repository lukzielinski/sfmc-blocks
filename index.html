<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>SFMC Label Picker</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, Helvetica, sans-serif;
            background: #fff;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .item {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            transition: .2s;
        }

        .item:hover {
            background: #f5f5f5;
            border-color: #0070d2;
        }

        .thumb {
            width: 100px;
            margin-right: 15px;
        }

        #preview {
            margin-top: 30px;
            text-align: center;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }

        #active-label {
            display: none;
            max-width: 100%;
        }
    </style>
</head>

<body>

<h3>Wybierz etykietę</h3>

<div class="item"
     data-url="https://imgnews.raja-group.com/00-structure/label/FR-label-month-selection.png"
     data-alt="Sélection du mois">

    <img class="thumb"
         src="https://imgnews.raja-group.com/00-structure/label/FR-label-month-selection.png">

    <span>Sélection du mois</span>

</div>

<div class="item"
     data-url="https://imgnews.raja-group.com/00-structure/label/FR-label-special-offer.png"
     data-alt="Offre spéciale">

    <img class="thumb"
         src="https://imgnews.raja-group.com/00-structure/label/FR-label-special-offer.png">

    <span>Offre spéciale</span>

</div>

<div id="preview">
    <img id="active-label">
</div>

<script src="blocksdk.js"></script>

<script>

let sdk = null;

if (window.sfdc && window.sfdc.BlockSDK) {
    sdk = new window.sfdc.BlockSDK();
} else {
    console.error("BlockSDK nie został załadowany.");
}

const preview = document.getElementById("active-label");

document.querySelectorAll(".item").forEach(item => {

    item.addEventListener("click", function () {

        const url = this.dataset.url;
        const alt = this.dataset.alt;

        preview.src = url;
        preview.style.display = "block";

        if (sdk) {

            sdk.setContent(
                `<img src="${url}" alt="${alt}" width="268" height="26" style="display:block;border:0;">`
            );

            sdk.setData({
                selectedUrl: url,
                selectedAlt: alt
            });

        }

    });

});

if (sdk) {

    sdk.getData(function(data){

        if(data && data.selectedUrl){

            preview.src = data.selectedUrl;
            preview.style.display = "block";

        }

    });

}

</script>

</body>
</html>
