<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>SFMC Label Picker</title>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    margin:20px;
}

h3{
    margin-bottom:20px;
}

#gallery{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.item{
    border:1px solid #ddd;
    border-radius:5px;
    padding:8px;
    cursor:pointer;
}

.item:hover{
    border-color:#0070d2;
    background:#f5f5f5;
}

.item img{
    width:268px;
    display:block;
}

#preview{
    margin-top:30px;
    border-top:1px solid #ddd;
    padding-top:20px;
}

#preview img{
    width:268px;
}

.loading{
    color:#888;
}

</style>

</head>

<body>

<h3>Ładowanie etykiet...</h3>

<div id="gallery" class="loading">
Pobieranie...
</div>

<div id="preview">
    <img id="selected" style="display:none;">
</div>

<script src="blocksdk.js"></script>

<script>

const sdk = new sfdc.BlockSDK();

const SOURCE =
"https://imgnews.raja-group.com/00-structure/crit-green/_crit-green-all-pays.html";

const gallery=document.getElementById("gallery");
const preview=document.getElementById("selected");

async function loadGallery(){

    try{

        const response=await fetch(SOURCE);

        const html=await response.text();

        const parser=new DOMParser();

        const doc=parser.parseFromString(html,"text/html");

        const images=doc.querySelectorAll("img");

        gallery.innerHTML="";

        images.forEach(image=>{

            const div=document.createElement("div");

            div.className="item";

            div.innerHTML=`
                <img
                    src="${image.src}"
                    alt="${image.alt}"
                >
                <div>${image.alt}</div>
            `;

            div.onclick=function(){

                preview.src=image.src;
                preview.alt=image.alt;
                preview.style.display="block";

                sdk.setContent(`
<img
src="${image.src}"
width="268"
height="26"
style="display:block;padding:0;margin:0;border:0;height:26px;width:268px;"
alt="${image.alt}">
`);

                sdk.setData({
                    src:image.src,
                    alt:image.alt
                });

            };

            gallery.appendChild(div);

        });

    }
    catch(e){

        gallery.innerHTML="<b>Błąd podczas pobierania HTML.</b>";

        console.error(e);

    }

}

sdk.getData(function(data){

    if(data && data.src){

        preview.src=data.src;
        preview.alt=data.alt;
        preview.style.display="block";

    }

});

loadGallery();

</script>

</body>
</html>
