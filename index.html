<!DOCTYPE html>
<html lang="pl">

<head>
<meta charset="UTF-8">
<title>SFMC Label Picker</title>

<style>

body {
    margin:20px;
    font-family:Arial, Helvetica, sans-serif;
}

h3 {
    margin-bottom:15px;
}

#search {
    width:100%;
    padding:8px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

#gallery {
    display:flex;
    flex-direction:column;
    gap:10px;
    max-height:600px;
    overflow:auto;
}

.item {
    display:flex;
    align-items:center;
    gap:15px;
    padding:8px;
    border:1px solid #ddd;
    border-radius:5px;
    cursor:pointer;
}

.item:hover {
    background:#f4f4f4;
    border-color:#0070d2;
}

.item img {
    width:268px;
    height:26px;
    object-fit:contain;
}

.item.selected {
    border:2px solid #28a745;
}

#preview {

    margin-top:25px;
    padding-top:20px;
    border-top:1px solid #ddd;

}

#preview img {

    width:268px;
    height:26px;

}

</style>

</head>


<body>


<h3>Wybierz etykietę</h3>


<input 
type="text" 
id="search" 
placeholder="Szukaj etykiety...">


<div id="gallery">
    Ładowanie...
</div>


<div id="preview">

<h4>Podgląd</h4>

<img id="selectedImage" style="display:none;">

</div>



<script src="blocksdk.js"></script>


<script>


const sdk = new sfdc.BlockSDK();


const gallery = document.getElementById("gallery");
const search = document.getElementById("search");
const preview = document.getElementById("selectedImage");


let labels = [];



function renderLabels(list){


    gallery.innerHTML="";


    list.forEach(label=>{


        const div=document.createElement("div");

        div.className="item";


        div.innerHTML=`

            <img src="${label.url}">

            <span>
                ${label.name}
            </span>

        `;



        div.onclick=function(){


            document
            .querySelectorAll(".item")
            .forEach(x=>x.classList.remove("selected"));


            div.classList.add("selected");



            preview.src=label.url;

            preview.alt=label.name;

            preview.style.display="block";



            const html = `

<img 
src="${label.url}"
width="268"
height="26"
style="display:block;padding:0;margin:0;border:0;height:26px;width:268px;"
alt="${label.name}">

`;



            sdk.setContent(html);



            sdk.setData({

                url:label.url,

                name:label.name

            });


        };



        gallery.appendChild(div);


    });


}




async function loadLabels(){


    try{


        const response = await fetch("./labels.json");


        labels = await response.json();


        renderLabels(labels);



    }
    catch(error){


        gallery.innerHTML =
        "<b>Błąd ładowania labels.json</b>";


        console.error(error);


    }


}




search.addEventListener("input",function(){


    const value=this.value.toLowerCase();



    const filtered = labels.filter(label=>


        label.name
        .toLowerCase()
        .includes(value)


    );


    renderLabels(filtered);



});




// przy ponownym otwarciu bloku

sdk.getData(function(data){


    if(data && data.url){


        preview.src=data.url;

        preview.style.display="block";



        setTimeout(()=>{


            document
            .querySelectorAll(".item")
            .forEach(item=>{


                if(item.innerHTML.includes(data.name)){

                    item.classList.add("selected");

                }


            });


        },500);



    }


});



loadLabels();



</script>


</body>

</html>
