<label for="bgColor">Wybierz kolor tła:</label>
<input type="color" id="bgColor" value="#ffffff">

<script src="https://developer.salesforce.com/docs/atlas.en-us.mc-sdk.meta/mc-sdk/js/blocksdk.js"></script>
<script>
    var sdk = new window.sfdc.BlockSDK();

    // Nasłuchiwanie zmiany koloru
    document.getElementById('bgColor').addEventListener('input', function(event) {
        var selectedColor = event.target.value;

        // Generowanie kodu HTML, który trafi do maila
        var htmlContent = '<div style="background-color: ' + selectedColor + '; padding: 20px;">Twój tekst lub zawartość tutaj</div>';

        // Przekazanie zawartości do Salesforce Marketing Cloud
        sdk.setContent(htmlContent, function(content) {
            // Kod został pomyślnie zaktualizowany w mailu
        });
    });
</script>
