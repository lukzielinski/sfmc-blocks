    <script>
    document.querySelectorAll('.resize').forEach(img => {
        img.addEventListener('click', function() {
            // 1. Tworzymy kopię obrazka, aby zachować jego parametry
            const clone = this.cloneNode(true);
            
            // 2. Kopiujemy do schowka
            navigator.clipboard.writeText(clone.outerHTML).then(() => {
                
                // 3. Czyścimy całe body
                document.body.innerHTML = '';
                
                // 4. Resetujemy style dla czystego widoku
                clone.style.border = "none";
                clone.style.margin = "0";
                clone.style.display = "block";
                clone.style.cursor = "default"; // Usuwamy efekt "kliknięcia" po wybraniu
                
                // 5. Wstawiamy obrazek
                document.body.appendChild(clone);
                
                // 6. Opcjonalne potwierdzenie
                console.log("Gotowe: " + clone.outerHTML);
            });
        });
    });
    </script>
